name: Bug report
description: Report a defect in the SDK, CLI or documentation.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Security issues should NOT
        be filed here — email security@asteby.com instead.

  - type: input
    id: version
    attributes:
      label: SDK / CLI version
      description: Output of `metacore --version` or the Go module version.
      placeholder: "v0.4.2"
    validations:
      required: true

  - type: input
    id: kernel
    attributes:
      label: Kernel API version (if known)
      placeholder: "2.0.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or a link to a failing repo.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
