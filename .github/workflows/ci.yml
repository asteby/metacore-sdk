name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      # starter-core is already marked `ignore` in .changeset/config.json for
      # the release pipeline; extend that intent to CI so its routeTree.gen
      # scaffold (only written by `tsr watch` at dev time) doesn't break
      # unrelated PRs. create-metacore-app is also excluded as release-only.
      - run: pnpm turbo run build typecheck --filter=...[origin/main] --filter=!@asteby/metacore-starter-core --filter=!create-metacore-app
