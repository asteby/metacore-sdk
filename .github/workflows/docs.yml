name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: docs
        # --ignore-workspace because the SDK monorepo's pnpm-workspace.yaml does
        # not include docs/. We want a standalone install scoped to docs/package.json.
        run: pnpm install --ignore-workspace --frozen-lockfile=false

      - name: Build VitePress site
        working-directory: docs
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if a maintainer hasn't toggled it
          # in Settings yet. Otherwise the action fails with "Get Pages site
          # failed" because the site doesn't exist.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
