services:
  db:
    # pgvector ships pg17 + the `vector` extension preinstalled, so the
    # backend can run `CREATE EXTENSION IF NOT EXISTS vector` and use
    # kernel/vector for semantic search out of the box. Link, ops and
    # hub all run the same image in production.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: metacore
      POSTGRES_USER: metacore
      POSTGRES_PASSWORD: metacore
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metacore -d metacore"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["7200:7200"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "7200"
      DATABASE_URL: "postgres://metacore:metacore@db:5432/metacore?sslmode=disable"
      JWT_SECRET: "change-me-super-long-random-secret-at-least-32-chars"
      CORS_ORIGINS: "http://localhost:5173"
      SEED_DEMO_DATA: "true"
      # Generate real keys with:
      #   docker run --rm node:22-alpine npx -y web-push generate-vapid-keys
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
      VAPID_SUBJECT: "mailto:admin@example.com"
      # Semantic search is opt-in. Set ENABLE_VECTOR_STORE=true to wire
      # app.VectorStore (kernel/vector) on top of the pgvector image; set
      # ENABLE_EMBEDDER=true to wire app.Embedder against the BGE-M3
      # endpoint. Both are off by default so the starter boots even on a
      # vanilla postgres image if someone swaps it out.
      ENABLE_VECTOR_STORE: "true"
      ENABLE_EMBEDDER: "false"
      BGE_EMBEDDING_URL: ""
      BGE_EMBEDDING_MODEL: ""
    env_file:
      - path: ./backend/.env
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:7200/api"
        VITE_WS_URL: "ws://localhost:7200/api/ws"
    # Frontend Dockerfile builds static assets and serves via nginx on :80.
    # Map host 5173 -> container 80 so the documented localhost:5173 still works.
    ports: ["5173:80"]
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:7200/api"
      VITE_WS_URL: "ws://localhost:7200/api/ws"
    env_file:
      - path: ./frontend/.env
        required: false

volumes:
  pgdata:
