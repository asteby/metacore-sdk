services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metacore
      POSTGRES_USER: metacore
      POSTGRES_PASSWORD: metacore
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metacore -d metacore"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
