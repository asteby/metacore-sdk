packages:
  - 'packages/*'
  - 'templates/*'
  - 'examples/*'
  - 'examples/*/frontend'

allowBuilds:
  '@swc/core': true
  esbuild: true

packageExtensions:
  'input-otp@*':
    peerDependencies:
      '@types/react': '^19'
  'cmdk@*':
    peerDependencies:
      '@types/react': '^19'
  'react-phone-number-input@*':
    peerDependencies:
      '@types/react': '^19'

patchedDependencies:
  '@changesets/cli@2.31.1': patches/@changesets__cli@2.31.1.patch
